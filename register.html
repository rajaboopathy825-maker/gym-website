<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Register - Indhrajith Fitness</title>
	<link rel="stylesheet" href="./styles.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
	<header class="site-header">
		<div class="container header-inner">
			<a class="brand" href="./index.html">
				<svg class="brand-logo" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
					<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"></circle>
					<path d="M7 12h10M9 9l-2 3 2 3M15 9l2 3-2 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
				</svg>
				<span>Indhrajith Fitness</span>
			</a>
			<button class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="siteNav">☰</button>
			<nav id="siteNav" class="site-nav" aria-label="Primary">
				<ul>
					<li><a href="./index.html#about">About</a></li>
					<li><a href="./index.html#programs">Programs</a></li>
					<li><a href="./index.html#contact">Contact</a></li>
					<li><a href="./login.html">Login</a></li>
				</ul>
			</nav>
		</div>
	</header>

	<main class="section">
		<div class="container">
			<div class="card form-card">
				<h1 class="form-title">Student Registration</h1>
				<form id="registerForm" novalidate>
					<div class="grid-2">
						<label>
							<span>Full Name</span>
							<input type="text" name="fullName" autocomplete="name" required>
						</label>
						<label>
							<span>Email</span>
							<input type="email" name="email" autocomplete="email" required>
						</label>
						<label>
							<span>Phone</span>
							<input type="tel" name="phone" autocomplete="tel" pattern="[0-9]{10}" placeholder="10-digit number" required>
						</label>
						<label>
							<span>Password</span>
							<input type="password" name="password" minlength="6" required>
						</label>
						<label>
							<span>Confirm Password</span>
							<input type="password" name="confirmPassword" minlength="6" required>
						</label>
						<label>
							<span>Profile Photo</span>
							<input type="file" name="photo" accept="image/*" capture="environment">
						</label>
					</div>
					<div class="preview" id="photoPreview" hidden>
						<img id="photoImg" alt="Photo preview">
					</div>
					<button type="submit" class="btn btn-primary w-100">Create Account</button>
					<p class="form-hint">Already registered? <a href="./login.html">Login here</a>.</p>
				</form>
			</div>
		</div>
	</main>

	<footer class="site-footer">
		<div class="container footer-inner">
			<p>© <span id="year"></span> Indhrajith Fitness Gym</p>
		</div>
	</footer>

	<script src="./app.js"></script>
</body>
</html>
